<h1>{{ isEdit ? 'Editar Ticket' : 'Crear Ticket' }}</h1>

<form [formGroup]="form" (ngSubmit)="save()">

  <label>
    Título:
    <input formControlName="title" />
  </label>
  <div *ngIf="form.get('title')?.invalid && form.get('title')?.touched">
    El título es obligatorio y mínimo 5 caracteres
  </div>

  <label>
    Descripción:
    <textarea formControlName="description"></textarea>
  </label>
  <div *ngIf="form.get('description')?.invalid && form.get('description')?.touched">
    La descripción es obligatoria y mínimo 20 caracteres
  </div>

  <label>
    Categoría:
    <select formControlName="category">
      <option *ngFor="let c of categories" [value]="c">{{ c }}</option>
    </select>
  </label>

  <label>
    Prioridad:
    <select formControlName="priority">
      <option *ngFor="let p of priorities" [value]="p">{{ p }}</option>
    </select>
  </label>

  <label>
    Responsable:
    <input formControlName="assignee" />
  </label>

  <label *ngIf="isEdit">
    Estado:
    <select formControlName="status">
      <option *ngFor="let s of statuses" [value]="s">{{ s }}</option>
    </select>
  </label>

  <button type="submit">{{ isEdit ? 'Actualizar' : 'Crear' }}</button>
  <button type="button" [routerLink]="['/tickets']">Cancelar</button>

</form>
